<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kaffeeboje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      text-transform: lowercase;
    }

    :root {
      --red: #f84022;
      --bg: #faf8f5;
      --text: #1a1a1a;
      --ocean: #0b1e35;
    }

    html { scroll-behavior: smooth; }

    body {
      width: 100%;
      overflow-x: hidden;
      background: var(--bg);
      font-family: 'League Spartan', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    #intro-bg {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      transition: opacity 0.8s ease;
    }
    #intro-bg.fade-out { opacity: 0; pointer-events: none; }

    #logo-wrap {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #logo-anim {
      width: 160px;
      height: 160px;
      transform: scale(60);
      transform-origin: center center;
      animation: zoomOut 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 1.2s;
    }

    @keyframes zoomOut {
      0%   { transform: scale(60); }
      100% { transform: scale(1); }
    }

    #site { opacity: 0; transition: opacity 0.8s ease; }
    #site.visible { opacity: 1; }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2rem;
      text-align: center;
      background: linear-gradient(to bottom, var(--bg) 55%, #0b1e35 100%);
      overflow: hidden;
    }

    .hero-spacer { width: 160px; height: 160px; flex-shrink: 0; }

    .site-title {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text);
      margin-top: 1.5rem;
      position: relative;
      z-index: 6;
    }

    .scroll-hint {
      position: absolute;
      bottom: 13rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transition: opacity 0.6s ease;
      cursor: pointer;
      z-index: 10;
    }
    .scroll-hint.visible { opacity: 1; }
    .scroll-hint span {
      font-size: 0.65rem;
      font-weight: 200;
      letter-spacing: 0.22em;
      color: var(--text);
    }
    .scroll-hint svg { animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    /* KEY FIXES:
       - left/right: -4px → bleeds past viewport edges, no side gaps
       - background: #0b1e35 → solid ocean colour fills below wave crests, no stripe
       - wave-track width: 200vw (not %) → reliable on all screens
       - SVG height="70" explicit → doesn't collapse on mobile
       - translateX(-50%) of 200vw track = shift by 100vw = one seamless tile
    */
    .water-surface {
      position: absolute;
      bottom: 0;
      left: -4px;
      right: -4px;
      height: 120px;
      overflow: hidden;
      z-index: 8;
      pointer-events: none;
      background: #0b1e35;
    }

    .wave-track {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200vw;
      will-change: transform;
    }
    .wave-track svg {
      display: block;
      width: 100%;
      height: 70px;
    }

    .wave-track-1 { animation: waveMove  8s linear infinite; }
    .wave-track-2 { animation: waveMove 14s linear infinite reverse; bottom: 5px; opacity: 0.6; }
    .wave-track-3 { animation: waveMove  5s linear infinite; bottom: 10px; opacity: 0.35; }

    @keyframes waveMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ocean {
      background: linear-gradient(to bottom,
        #0b1e35 0%,
        #081629 35%,
        #060f1e 65%,
        #040c18 100%
      );
      position: relative;
      overflow: hidden;
      padding: 5rem 2rem 0;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .light-shaft {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 60%;
      background: radial-gradient(ellipse at 50% 0%,
        rgba(120,180,255,0.07) 0%,
        rgba(80,140,220,0.03) 45%,
        transparent 70%
      );
      pointer-events: none;
    }

    .bubbles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }
    .bubble {
      position: absolute;
      bottom: 15%;
      border-radius: 50%;
      border: 1px solid rgba(160,210,255,0.3);
      background: rgba(140,195,255,0.07);
      animation: rise linear infinite;
    }
    .bubble:nth-child(1)  { width:9px;  height:9px;  left:7%;  animation-duration:13s; animation-delay:0s;   }
    .bubble:nth-child(2)  { width:4px;  height:4px;  left:15%; animation-duration:18s; animation-delay:2s;   }
    .bubble:nth-child(3)  { width:13px; height:13px; left:23%; animation-duration:11s; animation-delay:1s;   }
    .bubble:nth-child(4)  { width:5px;  height:5px;  left:32%; animation-duration:20s; animation-delay:5s;   }
    .bubble:nth-child(5)  { width:10px; height:10px; left:40%; animation-duration:14s; animation-delay:3s;   }
    .bubble:nth-child(6)  { width:3px;  height:3px;  left:49%; animation-duration:16s; animation-delay:0.5s; }
    .bubble:nth-child(7)  { width:8px;  height:8px;  left:57%; animation-duration:10s; animation-delay:7s;   }
    .bubble:nth-child(8)  { width:12px; height:12px; left:65%; animation-duration:22s; animation-delay:4s;   }
    .bubble:nth-child(9)  { width:4px;  height:4px;  left:73%; animation-duration:15s; animation-delay:1.5s; }
    .bubble:nth-child(10) { width:7px;  height:7px;  left:81%; animation-duration:12s; animation-delay:8s;   }
    .bubble:nth-child(11) { width:3px;  height:3px;  left:89%; animation-duration:19s; animation-delay:3s;   }
    .bubble:nth-child(12) { width:9px;  height:9px;  left:95%; animation-duration:9s;  animation-delay:6s;   }
    .bubble:nth-child(13) { width:5px;  height:5px;  left:3%;  animation-duration:17s; animation-delay:9s;   }
    .bubble:nth-child(14) { width:11px; height:11px; left:44%; animation-duration:13s; animation-delay:11s;  }
    .bubble:nth-child(15) { width:4px;  height:4px;  left:70%; animation-duration:21s; animation-delay:2s;   }
    .bubble:nth-child(16) { width:6px;  height:6px;  left:27%; animation-duration:24s; animation-delay:13s;  }
    .bubble:nth-child(17) { width:8px;  height:8px;  left:55%; animation-duration:11s; animation-delay:15s;  }
    .bubble:nth-child(18) { width:3px;  height:3px;  left:85%; animation-duration:16s; animation-delay:4s;   }

    @keyframes rise {
      0%   { transform: translateY(0) translateX(0);      opacity: 0; }
      5%   { opacity: 1; }
      85%  { opacity: 0.75; }
      100% { transform: translateY(-100vh) translateX(14px); opacity: 0; }
    }

    .ocean-content {
      position: relative;
      z-index: 3;
      max-width: 560px;
      margin-bottom: 4rem;
    }
    .ocean-label {
      font-size: 0.65rem;
      font-weight: 200;
      letter-spacing: 0.25em;
      color: rgba(150,200,255,0.45);
      margin-bottom: 2rem;
    }
    .ocean-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      line-height: 1.1;
      color: rgba(220,235,255,0.9);
      margin-bottom: 1.8rem;
    }
    .ocean-text {
      font-size: 1rem;
      font-weight: 200;
      color: rgba(150,195,240,0.55);
      line-height: 1.9;
      letter-spacing: 0.02em;
    }

    .seafloor {
      position: relative;
      width: 100%;
      margin-top: auto;
      z-index: 3;
    }

    .seafloor-approach {
      height: 140px;
      background: linear-gradient(to bottom, transparent, #030810);
    }

    .seafloor-base {
      position: relative;
      height: 220px;
      background: #030810;
      overflow: hidden;
    }

    .seafloor-base::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        88deg,
        transparent 0px,
        transparent 22px,
        rgba(255,255,255,0.015) 23px,
        transparent 24px
      );
    }

    .seafloor-svg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .seagrass {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 110px;
      z-index: 4;
    }
    .grass-blade {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      animation: sway ease-in-out infinite;
      border-radius: 1px 1px 0 0;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-7deg); }
      50%       { transform: rotate(7deg); }
    }

    .kelp-layer {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .kelp-stalk {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      animation: kelpSway ease-in-out infinite;
    }
    @keyframes kelpSway {
      0%, 100% { transform: rotate(-5deg) scaleY(1); }
      50%       { transform: rotate(5deg)  scaleY(0.98); }
    }

    .mote {
      position: absolute;
      border-radius: 50%;
      background: rgba(180,220,255,0.1);
      animation: drift linear infinite;
      pointer-events: none;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 0.4; }
      100% { transform: translate(25px, -90px); opacity: 0; }
    }

    .anchor-point {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .anchor-ring {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(120,180,120,0.35);
    }
    .anchor-label {
      font-size: 0.5rem;
      font-weight: 200;
      letter-spacing: 0.2em;
      color: rgba(120,180,120,0.3);
    }
  </style>
</head>

          </svg>

        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>

      <div class="ocean-content">
        <p class="ocean-label">am grund des meeres</p>
        <h2 class="ocean-title">wo der kaffee<br>seine tiefe findet.</h2>
        <p class="ocean-text">jede bohne hat eine reise hinter sich — von sonnigen hängen über dunkle röstungen bis in deine tasse. wie eine boje, die auf dem wasser treibt, verbinden wir zwei welten.</p>
      </div>

               xmlns="http://www.w3.org/2000/svg">

  <script>
    const introBg = document.getElementById('intro-bg');
    const site    = document.getElementById('site');
    const hint    = document.getElementById('scroll-hint');

    setTimeout(() => {
      introBg.classList.add('fade-out');
      site.classList.add('visible');
      document.body.style.overflow = 'auto';
      setTimeout(() => hint.classList.add('visible'), 600);
    }, 3100);

    const seagrass    = document.getElementById('seagrass');
    const grassColors = ['#1a3d1a','#163514','#1e4a1c','#15340f','#224a1a'];
    for (let i = 0; i < 70; i++) {
      const el = document.createElement('div');
      el.className = 'grass-blade';
      const h = 28 + Math.random() * 52;
      el.style.cssText = `
        left:${Math.random()*100}%;
        height:${h}px;
        width:${1+Math.random()*1.5}px;
        background:${grassColors[Math.floor(Math.random()*grassColors.length)]};
        animation-delay:${Math.random()*3}s;
        animation-duration:${2.2+Math.random()*2.2}s;
        opacity:${0.5+Math.random()*0.5};
      `;
      seagrass.appendChild(el);
    }

    const kelpLayer = document.getElementById('kelp-layer');
    const kelpData = [
      { l:5,   h:160, c:'#1a4a18', d:0,   dur:4.5, b:5 },
      { l:12,  h:120, c:'#22601e', d:1.2, dur:3.8, b:4 },
      { l:22,  h:180, c:'#184016', d:0.5, dur:5.2, b:6 },
      { l:35,  h:100, c:'#1e5420', d:2,   dur:3.5, b:3 },
      { l:48,  h:150, c:'#165a14', d:0.8, dur:4.8, b:5 },
      { l:58,  h:190, c:'#204e1c', d:1.5, dur:5.5, b:6 },
      { l:68,  h:130, c:'#1c4818', d:0.3, dur:4.0, b:4 },
      { l:78,  h:170, c:'#185414', d:2.2, dur:4.6, b:5 },
      { l:88,  h:110, c:'#22581e', d:0.7, dur:3.6, b:3 },
      { l:94,  h:145, c:'#1a4a18', d:1.8, dur:5.0, b:4 },
    ];

    kelpData.forEach(k => {
      const wrap = document.createElement('div');
      wrap.className = 'kelp-stalk';
      wrap.style.cssText = `left:${k.l}%;height:${k.h}px;animation-delay:${k.d}s;animation-duration:${k.dur}s;width:3px;`;

      const ns  = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', '60');
      svg.setAttribute('height', String(k.h));
      svg.setAttribute('viewBox', `0 0 60 ${k.h}`);
      svg.style.overflow = 'visible';

      const stalk = document.createElementNS(ns, 'path');
      stalk.setAttribute('d', `M30,${k.h} Q28,${k.h*0.6} 30,${k.h*0.3} Q32,${k.h*0.1} 30,0`);
      stalk.setAttribute('stroke', k.c);
      stalk.setAttribute('stroke-width', '2.5');
      stalk.setAttribute('fill', 'none');
      stalk.setAttribute('opacity', '0.85');
      svg.appendChild(stalk);

      for (let i = 0; i < k.b; i++) {
        const t    = (i + 1) / (k.b + 1);
        const y    = k.h * (1 - t * 0.85);
        const side = i % 2 === 0 ? 1 : -1;
        const lw   = 18 + Math.random() * 20;
        const lh   = 10 + Math.random() * 8;
        const leaf = document.createElementNS(ns, 'ellipse');
        leaf.setAttribute('cx', String(30 + side * (lw * 0.55)));
        leaf.setAttribute('cy', String(y));
        leaf.setAttribute('rx', String(lw));
        leaf.setAttribute('ry', String(lh * 0.45));
        leaf.setAttribute('fill', k.c);
        leaf.setAttribute('opacity', String(0.55 + Math.random() * 0.3));
        leaf.setAttribute('transform', `rotate(${side*(15+Math.random()*20)} 30 ${y})`);
        svg.appendChild(leaf);
      }

      wrap.appendChild(svg);
      kelpLayer.appendChild(wrap);
    });

    const ocean = document.getElementById('ocean');
    for (let i = 0; i < 25; i++) {
      const m    = document.createElement('div');
      m.className = 'mote';
      const size  = 1 + Math.random() * 2.5;
      m.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${4+Math.random()*30}%;animation-duration:${5+Math.random()*12}s;animation-delay:${Math.random()*10}s;`;
      ocean.appendChild(m);
    }
  </script>
