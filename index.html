<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kaffeeboje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      text-transform: lowercase;
    }

    :root {
      --red: #f84022;
      --bg: #faf8f5;
      --text: #1a1a1a;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'League Spartan', sans-serif;
      color: var(--text);
    }

    #intro-bg {
      position: fixed;
      inset: 0;
      z-index: 99;
      background: var(--bg);
      transition: opacity 0.8s ease;
    }

    #intro-bg.fade-out {
      opacity: 0;
    }

    #logo-wrap {
      position: fixed;
      inset: 0;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #logo-anim {
      width: 160px;
      height: 160px;
      transform: scale(60);
      transform-origin: center center;
      animation: zoomOut 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 1.2s;
    }

    @keyframes zoomOut {
      0%   { transform: scale(60); }
      100% { transform: scale(1); }
    }

    #site {
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #site.visible {
      opacity: 1;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2rem;
      text-align: center;
    }

    .site-title {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text);
      margin-top: 1.5rem;
    }

    .hero-spacer {
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }
  </style>
</head>
